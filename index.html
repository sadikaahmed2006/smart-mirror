<!DOCTYPE html>
<html>
<head>
  <title>Smart Mirror</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="top-left">
    <h1 id="time">00:00</h1>
    <h2 id="date">Loading date...</h2>
  </div>

  <div class="top-right">
    <h2>Weather</h2>
    <p>St. John's, NL</p>
    <p>8°C | Cloudy</p>
  </div>

  <div class="bottom-left">
    <h2>Today</h2>
    <p>Gym reminder: Chest + Biceps</p>
    <p>Drink water</p>
    <p>Review job applications</p>
  </div>

  <div class="bottom-right">
    <h2>Quote</h2>
    <p>"Build something small, then improve it."</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
